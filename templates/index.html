<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Łączenie PDF</title>
</head>
<body>
    <h2>Prześlij pliki PDF do połączenia</h2>
    <form action="/" method="post" enctype="multipart/form-data">
        <input type="file" name="pdf_files" multiple accept="application/pdf" required>
        <button type="submit">Połącz PDF-y</button>
    </form>
</body>
</html>
